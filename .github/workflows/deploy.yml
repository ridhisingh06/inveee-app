name: Deploy Full Stack

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:

  # ---------------- DEBUG ----------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ls -Rla

  # ---------------- BACKEND ----------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - run: dotnet restore
        working-directory: backend

      - run: dotnet build --configuration Release --no-restore
        working-directory: backend

  # ---------------- FRONTEND ----------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Angular
        run: npm run build -- --configuration production
        working-directory: frontend

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/frontend

  # ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'

    env:
      AWS_S3_BUCKET: invmgmt-master
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "396287094524"
      ECR_REPOSITORY: inveee-app
      ECS_SERVICE: inveee-service
      ECS_CLUSTER: inveee-cluster
      CONTAINER_NAME: app

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-dist

      - name: Check downloaded files
        run: ls -R frontend-dist

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy frontend to S3
        run: aws s3 sync frontend-dist s3://${{ env.AWS_S3_BUCKET }} --delete

      - name: Enable static hosting
        run: |
          aws s3 website s3://${{ env.AWS_S3_BUCKET }} \
            --index-document index.html \
            --error-document index.html

      - name: Apply bucket policy
        run: |
          cat <<EOF > policy.json
          {
            "Version":"2012-10-17",
            "Statement":[{
              "Effect":"Allow",
              "Principal":"*",
              "Action":"s3:GetObject",
              "Resource":"arn:aws:s3:::${{ env.AWS_S3_BUCKET }}/*"
            }]
          }
          EOF
          aws s3api put-bucket-policy \
            --bucket ${{ env.AWS_S3_BUCKET }} \
            --policy file://policy.json

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}

          IMAGE_SHA=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/${{ env.ECR_REPOSITORY }}:latest

          docker build -t $IMAGE_SHA backend/
          docker tag $IMAGE_SHA $IMAGE_LATEST

          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST

          echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

      - name: Render ECS Task Definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
