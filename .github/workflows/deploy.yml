# .github/workflows/deploy.yml
name: Deploy Full Stack

on:
  push:
    branches: [main]
    paths:
      - '**/*.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ------------------------------------------------------------
  # DEBUG JOB – verify repository layout
  # ------------------------------------------------------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository tree (root)
        run: |
          echo "=== Repository root ==="
          ls -Rla
      - name: Show frontend folder tree
        run: |
          if [ -d "frontend" ]; then
            echo "=== frontend contents ==="
            ls -Rla frontend | head -200
          else
            echo "frontend folder NOT found"
          fi

  # ------------------------------------------------------------
  # BUILD BACKEND (.NET)
  # ------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend
      - name: Build backend
        run: dotnet build --configuration Release --no-restore
        working-directory: backend
      - name: Run tests (optional, continue on error)
        run: dotnet test --configuration Release --no-build --verbosity normal
        working-directory: backend
        continue-on-error: true

  # ------------------------------------------------------------
  # BUILD FRONTEND (Angular) – uses frontend folder
  # ------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: debug
    outputs:
      dist_path: ${{ steps.detect-dist.outputs.dist_path }}
    steps:
      - uses: actions/checkout@v4
      - name: Debug – Show frontend tree after checkout
        run: |
          echo "=== frontend contents ==="
          ls -Rla frontend | head -200
      - name: Setup Node.js (LTS 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install npm dependencies
        run: npm ci
        working-directory: frontend
      - name: Build Angular for production
        run: npm run build -- --configuration production
        working-directory: frontend
      - name: Verify Angular build output (basic check)
        run: |
          echo "=== Checking for frontend/dist folder ==="
          if [ -d "frontend/dist" ]; then
            echo "✅ frontend/dist folder exists"
            echo "Listing some files:"
            find frontend/dist -type f | head -20
          else
            echo "❌ frontend/dist folder NOT found"
            echo "Repository tree of frontend:"
            ls -Rla frontend
            exit 1
          fi
      - name: Detect Angular dist path dynamically
        id: detect-dist
        run: |
          echo "=== Detecting Angular output path from angular.json ==="
          # Try to extract explicit outputPath from angular.json
          OUTPUT_PATH=$(grep -Po "\"outputPath\"\s*:\s*\"\K[^\"]+" frontend/angular.json | head -1)
          if [ -n "$OUTPUT_PATH" ]; then
            DIST_PATH="frontend/$OUTPUT_PATH"
            echo "✅ outputPath found: $OUTPUT_PATH"
          else
            echo "⚠️ outputPath not defined, using fallback"
            # Fallback: first subdirectory inside frontend/dist (if any) only if the folder exists
            if [ -d "frontend/dist" ]; then
              FOUND=$(find frontend/dist -mindepth 1 -maxdepth 1 -type d | head -1)
            else
              FOUND=""
            fi
            if [ -n "$FOUND" ]; then
              DIST_PATH="$FOUND"
            else
              DIST_PATH="frontend/dist"
            fi
          fi
          if [ -d "$DIST_PATH" ]; then
            echo "dist_path=$DIST_PATH" >> $GITHUB_OUTPUT
            echo "=== Using Angular dist folder: $DIST_PATH ==="
            ls -la "$DIST_PATH"
          else
            echo "❌ Unable to locate Angular dist folder at $DIST_PATH"
            echo "Available dist directories:"
            find frontend -type d -name dist
            exit 1
          fi

  # ------------------------------------------------------------
  # DEPLOY (Frontend to S3, Backend to ECS)
  # ------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_S3_BUCKET: invmgmt-frontend
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: '396287094524'
      ECR_REPOSITORY: inveee-app
      ECS_SERVICE: inveee-service
      ECS_CLUSTER: inveee-cluster
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Re‑detect Angular dist path (safety)
        id: detect-dist-deploy
        run: |
          echo "=== Detecting Angular output path from angular.json ==="
          OUTPUT_PATH=$(grep -Po "\"outputPath\"\s*:\s*\"\K[^\"]+" frontend/angular.json | head -1)
          if [ -n "$OUTPUT_PATH" ]; then
            DIST_PATH="frontend/$OUTPUT_PATH"
          else
            if [ -d "frontend/dist" ]; then
              FOUND=$(find frontend/dist -mindepth 1 -maxdepth 1 -type d | head -1)
              DIST_PATH=${FOUND:-frontend/dist}
            else
              DIST_PATH=frontend/dist
            fi
          fi
          echo "dist_path=$DIST_PATH" >> $GITHUB_OUTPUT
      - name: Deploy frontend to S3
        run: |
          DIST_PATH="${{ needs.build-frontend.outputs.dist_path }}"
          echo "=== Syncing $DIST_PATH to s3://${{ env.AWS_S3_BUCKET }} ==="
          aws s3 sync "$DIST_PATH" "s3://${{ env.AWS_S3_BUCKET }}" \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          echo "=== Uploading index.html without cache ==="
          aws s3 cp "$DIST_PATH/index.html" "s3://${{ env.AWS_S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.AWS_ACCOUNT_ID }}
      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "=== Building Docker image ==="
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            backend/
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
      - name: Deploy task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
      - name: Deployment Summary
        run: |
          echo "\n╔═══════════════════════════════════════════════════════╗"
          echo "║         DEPLOYMENT COMPLETED SUCCESSFULLY          ║"
          echo "╚═══════════════════════════════════════════════════════╝\n"
          echo " Frontend (S3):"
          echo "   URL: http://${{ env.AWS_S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com\n"
          echo " Backend (ECS):"
          echo "   Cluster: ${{ env.ECS_CLUSTER }}"
          echo "   Service: ${{ env.ECS_SERVICE }}"
          echo "   Image: ${{ steps.build-image.outputs.image }}\n"
          echo " Resources:"
          echo "   Region: ${{ env.AWS_REGION }}"
          echo "   Account: ${{ env.AWS_ACCOUNT_ID }}\n"
          echo "All systems operational!"
