name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # Required for OIDC token

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Debug - Show directory structure
        run: |
          echo "=== Current Working Directory ==="
          pwd
          echo ""
          echo "=== Contents of repository root ==="
          ls -la
          echo ""
          echo "=== Check if invmgmt.web exists ==="
          if [ -d "invmgmt.web" ]; then
            echo "✅ invmgmt.web folder found"
            ls -la invmgmt.web/
          else
            echo "❌ invmgmt.web NOT found"
          fi
          echo ""
          echo "=== Check if Invmgmt-master exists ==="
          if [ -d "Invmgmt-master" ]; then
            echo "✅ Invmgmt-master folder found"
            ls -la Invmgmt-master/
          else
            echo "❌ Invmgmt-master NOT found"
          fi

  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: invmgmt.web

      - name: Build backend
        run: dotnet build --configuration Release --no-restore
        working-directory: invmgmt.web

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal
        working-directory: invmgmt.web
        continue-on-error: true

  build-frontend:
    runs-on: ubuntu-latest
    needs: debug

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: Invmgmt-master

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: Invmgmt-master

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      SOURCE_DIR: Invmgmt-master/dist/invmgmt-frontend/browser
      AWS_S3_BUCKET: invmgmt-master
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: '396287094524'
      ECR_REPOSITORY: inveee-app
      ECS_SERVICE: inveee-service
      ECS_CLUSTER: inveee-cluster
      CONTAINER_NAME: app

    steps:
      - uses: actions/checkout@v4

      # OPTION A: Use Long-term Credentials (Since OIDC not set up)
      - name: Configure AWS Credentials (IAM User)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Deploy Frontend to S3
      - name: Setup Node for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install
        working-directory: Invmgmt-master

      - name: Build frontend
        run: npm run build -- --configuration production
        working-directory: Invmgmt-master

      - name: Deploy frontend to S3
        run: |
          if [ ! -d "$SOURCE_DIR" ]; then
            echo "SOURCE_DIR \"$SOURCE_DIR\" does not exist."
            exit 1
          fi
          echo "Uploading frontend to S3 bucket..."
          aws s3 sync "$SOURCE_DIR" "s3://$AWS_S3_BUCKET" --delete
          echo "Frontend deployed successfully!"

      # Deploy Backend to ECS
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.AWS_ACCOUNT_ID }}

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -t $ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA invmgmt.web/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA" >> $GITHUB_OUTPUT

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to Amazon ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment Summary
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          echo "Frontend deployed to: https://${{ env.AWS_S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
          echo "Backend deployed to ECS cluster: ${{ env.ECS_CLUSTER }}"
          echo "Service: ${{ env.ECS_SERVICE }}"
          echo "Docker image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"


