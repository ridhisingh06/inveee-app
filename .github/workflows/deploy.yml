# Updated workflow on 2026-07-15
name: Deploy Full Stack

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ----------------------------------------------------------------
  # DEBUG
  # ----------------------------------------------------------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository structure
        run: ls -Rla

  # ----------------------------------------------------------------
  # BACKEND BUILD
  # ----------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Build backend
        working-directory: backend
        run: dotnet build invmgmt.web.csproj -c Release

      - name: Run backend tests
        working-directory: backend
        run: dotnet test -c Release --no-build

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/out

  # ----------------------------------------------------------------
  # BACKEND DEPLOY  (AWS ECS / Fargate)
  # ----------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "396287094524"
      ECR_REPOSITORY: inveee-app
      ECS_CLUSTER: inveee-cluster
      ECS_SERVICE: inveee-service
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Build and push Docker image
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_SHA=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE_SHA backend/
          docker tag $IMAGE_SHA $IMAGE_LATEST
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

      - name: Get RDS endpoint from Terraform
        id: rds-endpoint
        run: |
          RDS_ENDPOINT=$(aws rds describe-db-instances \
            --db-instance-identifier inveee-postgres \
            --region ${{ env.AWS_REGION }} \
            --query 'DBInstances[0].Endpoint.Address' \
            --output text)
          echo "rds_endpoint=$RDS_ENDPOINT" >> $GITHUB_OUTPUT
          echo "RDS Endpoint: $RDS_ENDPOINT"

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            ConnectionStrings__DefaultConnection=Host=${{ steps.rds-endpoint.outputs.rds_endpoint }};Port=5432;Database=inventorydb;Username=postgres;Password=ridhisingh2003;Pooling=true;Minimum Pool Size=5;Maximum Pool Size=20;Connection Idle Lifetime=30;SSL Mode=Require;

      - name: Deploy to ECS
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Wait for ECS service stability
        run: |
          echo "Waiting for ECS service to become stable..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
          echo "ECS service is now stable!"

      - name: Diagnostic - ECS Service Events
        if: failure()
        run: |
          echo "=== ECS Service Events ==="
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].events' \
            --output table

      - name: Diagnostic - Failed/Stopped Tasks
        if: failure()
        run: |
          echo "=== Stopped Tasks ==="
          TASK_ARNS=$(aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service-name ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --desired-status STOPPED \
            --query 'taskArns' \
            --output text)
          
          for TASK_ARN in $TASK_ARNS; do
            if [ -n "$TASK_ARN" ]; then
              echo "--- Task: $TASK_ARN ---"
              aws ecs describe-tasks \
                --cluster ${{ env.ECS_CLUSTER }} \
                --tasks $TASK_ARN \
                --region ${{ env.AWS_REGION }} \
                --query 'tasks[0].{StoppedReason:stoppedReason,ExitCode:containers[0].exitCode,Reason:containers[0].reason}' \
                --output table
            fi
          done
          
          echo "=== Running Tasks ==="
          aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service-name ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --desired-status RUNNING \
            --output table

      - name: Diagnostic - Task Definition
        if: failure()
        run: |
          echo "=== Task Definition ==="
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --output json || true

      - name: Diagnostic - Target Health
        if: failure()
        run: |
          echo "=== Target Health ==="
          TG_ARN=$(aws elbv2 describe-target-groups --names inveee-tg --region ${{ env.AWS_REGION }} --query 'TargetGroups[0].TargetGroupArn' --output text)
          aws elbv2 describe-target-health \
            --target-group-arn $TG_ARN \
            --region ${{ env.AWS_REGION }} \
            --output table || true

      - name: Diagnostic - CloudWatch Logs
        if: failure()
        run: |
          echo "=== CloudWatch Logs ==="
          aws logs tail /ecs/inveee-app --region ${{ env.AWS_REGION }} --format short || true
