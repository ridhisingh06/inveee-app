# Updated workflow on 2026-07-15
name: Deploy Full Stack

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ----------------------------------------------------------------
  # DEBUG
  # ----------------------------------------------------------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository structure
        run: ls -Rla

  # ----------------------------------------------------------------
  # BACKEND BUILD
  # ----------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Build backend
        working-directory: backend
        run: dotnet build invmgmt.web.csproj -c Release

      - name: Run backend tests
        working-directory: backend
        run: dotnet test -c Release --no-build

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/out

  # ----------------------------------------------------------------
  # FRONTEND DEPLOY  (Vercel)
  #
  # Live URL : https://inveee-app.vercel.app
  # Project  : prj_1ncFmrh8PchpNyFXwDMZ4xs6c3fK
  # Org      : team_W1pwDE1fq8hpwxXcYSXsH7p0
  #
  # Secrets required (GitHub → Settings → Secrets → Actions):
  #   VERCEL_TOKEN       — Vercel personal access token
  #   VERCEL_ORG_ID      — team_W1pwDE1fq8hpwxXcYSXsH7p0
  #   VERCEL_PROJECT_ID  — prj_1ncFmrh8PchpNyFXwDMZ4xs6c3fK
  # ----------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate required secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ERROR: VERCEL_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "ERROR: VERCEL_ORG_ID secret is not set"
            exit 1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ERROR: VERCEL_PROJECT_ID secret is not set"
            exit 1
          fi
          echo "All required secrets are set"

      - name: Pull Vercel project settings
        working-directory: frontend
        run: vercel pull --yes --environment=production --token $VERCEL_TOKEN

      - name: Validate .vercel/project.json exists
        working-directory: frontend
        run: |
          if [ ! -f .vercel/project.json ]; then
            echo "ERROR: .vercel/project.json was not created by vercel pull"
            exit 1
          fi
          echo "OK: .vercel/project.json exists"
          cat .vercel/project.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Build project via Vercel
        working-directory: frontend
        run: vercel build --prod --token $VERCEL_TOKEN

      - name: DEBUG — build output
        working-directory: frontend
        run: |
          echo "=== .vercel/output/ ==="
          ls -la .vercel/output/ 2>/dev/null || echo ".vercel/output/ not found"
          echo "=== .vercel/output/static/ (first 20 files) ==="
          ls -la .vercel/output/static/ 2>/dev/null | head -20 || echo "static/ not found"
          echo "=== .vercel/output/static/index.html ==="
          ls -la .vercel/output/static/index.html 2>/dev/null || echo "index.html not found"

      - name: Deploy to Vercel (production)
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token $VERCEL_TOKEN

      - name: DEBUG — post-deployment
        if: always()
        working-directory: frontend
        run: |
          echo "=== Current working directory ==="
          pwd
          echo "=== .vercel/project.json ==="
          cat .vercel/project.json 2>/dev/null || echo "not found"
          echo "=== Build output ==="
          ls -la .vercel/output/ 2>/dev/null || echo "output directory not found"

  # ----------------------------------------------------------------
  # BACKEND DEPLOY  (AWS ECS / Fargate)
  # ----------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "396287094524"
      ECR_REPOSITORY: inveee-app
      ECS_CLUSTER: inveee-cluster
      ECS_SERVICE: inveee-service
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Build and push Docker image
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_SHA=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE_SHA backend/
          docker tag $IMAGE_SHA $IMAGE_LATEST
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
