# Updated workflow on 2026-07-15
name: Deploy Full Stack

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ----------------------------------------------------------------
  # DEBUG
  # ----------------------------------------------------------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository structure
        run: ls -Rla

  # ----------------------------------------------------------------
  # BACKEND BUILD
  # ----------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Build backend
        working-directory: backend
        run: dotnet build invmgmt.web.csproj -c Release

      - name: Run backend tests
        working-directory: backend
        run: dotnet test -c Release --no-build

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/out

  # ----------------------------------------------------------------
  # BACKEND DEPLOY  (AWS ECS / Fargate)
  # ----------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "396287094524"
      ECR_REPOSITORY: inveee-app
      ECS_CLUSTER: inveee-cluster
      ECS_SERVICE: inveee-service
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Build and push Docker image
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_SHA=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE_SHA backend/
          docker tag $IMAGE_SHA $IMAGE_LATEST
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
