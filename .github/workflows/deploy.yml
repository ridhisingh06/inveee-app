# .github/workflows/deploy.yml
# CI trigger comment added on 2026-06-23
name: Deploy Full Stack

# ------------------------------------------------------------
# Triggers
# ------------------------------------------------------------
on:
  workflow_dispatch:          # manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - '**/*.yml'
  pull_request:
    branches: [main]

# ------------------------------------------------------------
# Permissions
# ------------------------------------------------------------
permissions:
  contents: read
  id-token: write

# ============================================================
# JOBS
# ============================================================
jobs:
  # ------------------------------------------------------------
  # DEBUG – repository layout (helps when paths go missing)
  # ------------------------------------------------------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository tree (root)
        run: |
          echo "=== Repository root ==="
          ls -Rla
      - name: Show frontend folder tree
        run: |
          if [ -d "frontend" ]; then
            echo "=== frontend contents ==="
            ls -Rla frontend | head -200
          else
            echo "frontend folder NOT found"
          fi

  # ------------------------------------------------------------
  # BUILD BACKEND (.NET) – unchanged
  # ------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend
      - name: Build backend
        run: dotnet build --configuration Release --no-restore
        working-directory: backend
      - name: Run tests (optional, continue on error)
        run: dotnet test --configuration Release --no-build --verbosity normal
        working-directory: backend
        continue-on-error: true

  # ------------------------------------------------------------
  # BUILD FRONTEND (Angular) – produces an artifact
  # ------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Show frontend tree after checkout (debug)
        run: |
          echo "=== frontend contents ==="
          ls -Rla frontend | head -200

      - name: Setup Node.js (LTS 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Angular for production
        run: npm run build -- --configuration production
        working-directory: frontend

      - name: Detect Angular dist folder dynamically
        id: detect-dist
        run: |
          echo "=== Detecting Angular output path from angular.json ==="
          OUTPUT_PATH=$(grep -Po "\"outputPath\"\s*:\s*\"\K[^\"]+" frontend/angular.json | head -1 || true) || true
          if [ -n "$OUTPUT_PATH" ]; then
            DIST_PATH="frontend/$OUTPUT_PATH"
            echo "✅ outputPath found: $OUTPUT_PATH"
          else
            echo "⚠️ outputPath not defined, using fallback"
            DIST_PATH=frontend/dist
          fi
          echo "dist_path=$DIST_PATH" >> $GITHUB_OUTPUT
          echo "=== Using Angular dist folder: $DIST_PATH ==="

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ steps.detect-dist.outputs.dist_path }}
          if-no-files-found: error

  # ------------------------------------------------------------
  # DEPLOY – S3 (frontend) + ECS (backend)
  # ------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    env:
      AWS_S3_BUCKET: invmgmt-master
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: '396287094524'
      ECR_REPOSITORY: inveee-app
      ECS_SERVICE: inveee-service
      ECS_CLUSTER: inveee-cluster
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-dist
      - name: List repository tree (debug)\n        run: |\n          echo "=== Repository tree after artifact download ==="\n          ls -R\n\n      - name: Detect Angular dist folder dynamically\n        id: detect-dist-deploy\n        run: |\n          echo "=== Detecting Angular dist folder dynamically ==="\n          # Find the first directory that matches */dist/*\n          DIST_DIR=$(find . -type d -path "*/dist/*" | head -n 1)\n          if [ -z "$DIST_DIR" ]; then\n            echo "⚠️ No dist folder found, failing the job"\n            exit 1\n          fi\n          echo "Detected dist folder: $DIST_DIR"\n          echo "dist_path=$DIST_DIR" >> $GITHUB_OUTPUT\n\n      - name: List extracted dist folder contents (debug)\n        run: |\n          echo "=== Extracted dist folder contents ==="\n          ls -R ${{ steps.detect-dist-deploy.outputs.dist_path }}\n\n      - name: Verify index.html exists\n        run: |\n          if [ -f "${{ steps.detect-dist-deploy.outputs.dist_path }}/index.html" ]; then\n            echo "✅ index.html found."\n          else\n            echo "[ERROR] index.html is missing in the dist folder. Failing the job."\n            exit 1\n          fi\n\n      - name: Deploy index.html to S3 with no-cache headers\n        run: |\n          aws s3 cp "${{ steps.detect-dist-deploy.outputs.dist_path }}/index.html" s3://${{ env.AWS_S3_BUCKET }}/index.html \\
            --cache-control "max-age=0, no-cache, no-store, must-revalidate"\n\n      - name: Sync assets to S3 with long cache headers\n        run: |\n          aws s3 sync "${{ steps.detect-dist-deploy.outputs.dist_path }}/" s3://${{ env.AWS_S3_BUCKET }}/ \\
            --exclude "index.html" \\
            --delete \\
            --cache-control "max-age=31536000, public"
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS credentials
        run: |
          aws sts get-caller-identity
          aws s3 ls s3://${{ env.AWS_S3_BUCKET }} --region ${{ env.AWS_REGION }}

      - name: Enable S3 static website hosting
        run: |
          aws s3 website s3://${{ env.AWS_S3_BUCKET }} \
            --index-document index.html \
            --error-document index.html

      - name: Apply public read bucket policy
        run: |
          cat <<'EOF' > bucket-policy.json
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": ["s3:GetObject"],
                "Resource": ["arn:aws:s3:::${{ env.AWS_S3_BUCKET }}/*"]
              }
            ]
          }
          EOF
          aws s3api put-bucket-policy --bucket ${{ env.AWS_S3_BUCKET }} --policy file://bucket-policy.json



      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.AWS_ACCOUNT_ID }}

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "=== Building Docker image ==="
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            backend/
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment Summary
        run: |
          echo "\n╔═══════════════════════════════════════════════════════╗"
          echo "║         DEPLOYMENT COMPLETED SUCCESSFULLY          ║"
          echo "╚═══════════════════════════════════════════════════════╝\n"
          echo " Frontend (S3):"
          echo "   URL: http://${{ env.AWS_S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com\n"
          echo " Backend (ECS):"
          echo "   Cluster: ${{ env.ECS_CLUSTER }}"
          echo "   Service: ${{ env.ECS_SERVICE }}"
          echo "   Image: ${{ steps.build-image.outputs.image }}\n"
          echo " Resources:"
          echo "   Region: ${{ env.AWS_REGION }}"
          echo "   Account: ${{ env.AWS_ACCOUNT_ID }}\n"
          echo "All systems operational!"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E2OWWBTAD00Z79 --paths "/*"

      - name: Clean up orphan processes
        if: always()
        run: |
          echo "🧹 Cleaning up Docker resources and lingering processes"
          # Remove stopped containers, unused networks, images, and build cache
          docker system prune -af --volumes || true
          # Kill any stray background processes that might linger (e.g., npm, node)
          pkill -f node || true
          pkill -f npm || true
          echo "✅ Cleanup complete"
