# Updated workflow on 2026-07-15
name: Deploy Full Stack

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ----------------------------------------------------------------
  # DEBUG
  # ----------------------------------------------------------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository structure
        run: ls -Rla

  # ----------------------------------------------------------------
  # BACKEND BUILD
  # ----------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Build backend
        working-directory: backend
        run: dotnet build invmgmt.web.csproj -c Release

      - name: Run backend tests
        working-directory: backend
        run: dotnet test -c Release --no-build

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/out

  # ----------------------------------------------------------------
  # FRONTEND DEPLOY  (Vercel)
  #
  # Live URL:  https://inveee-app.vercel.app
  # Project:   prj_aY3yPZbu4VL2vhsz8kZHYeCA5K5v
  # Org:       team_W1pwDE1fq8hpwxXcYSXsH7p0
  #
  # Root cause of the old "frontend/frontend" error:
  #   vercel pull writes rootDirectory="frontend" into .vercel/project.json.
  #   When the CLI also runs inside working-directory: frontend, paths double.
  #
  # Fix:
  #   1. Commit frontend/.vercel/project.json with projectId + orgId so
  #      vercel pull is never needed at CI runtime.
  #   2. Run ALL vercel commands from the REPO ROOT using --cwd frontend.
  #      Vercel resolves everything relative to --cwd, not to the shell CWD,
  #      so rootDirectory in the dashboard setting never doubles the path.
  #   3. Drop --prebuilt entirely — let Vercel run `npm run build` itself
  #      so there is one canonical build path and no manual output assembly.
  #
  # Secrets required (GitHub → Settings → Secrets → Actions):
  #   VERCEL_TOKEN   — Vercel personal access token
  #   VERCEL_ORG_ID  — team_W1pwDE1fq8hpwxXcYSXsH7p0
  #   Project_ID     — prj_aY3yPZbu4VL2vhsz8kZHYeCA5K5v
  # ----------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.Project_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Diagnostics ─────────────────────────────────────────────
      - name: DEBUG — repo structure at checkout
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== Root listing ==="
          ls -la
          echo "=== frontend/ listing ==="
          ls -la frontend/
          echo "=== frontend/.vercel/ listing ==="
          ls -la frontend/.vercel/ 2>/dev/null || echo "frontend/.vercel/ does not exist"
          echo "=== frontend/.vercel/project.json ==="
          cat frontend/.vercel/project.json 2>/dev/null || echo "project.json not found"

      # ── Node / npm ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Vercel CLI ───────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: DEBUG — vercel CLI version and env
        run: |
          echo "=== Vercel CLI version ==="
          vercel --version
          echo "=== VERCEL_PROJECT_ID ==="
          echo "$VERCEL_PROJECT_ID"
          echo "=== VERCEL_ORG_ID ==="
          echo "$VERCEL_ORG_ID"
          echo "=== VERCEL_TOKEN set? ==="
          [ -n "$VERCEL_TOKEN" ] && echo "YES" || echo "NO — secret is empty"

      # ── Deploy ───────────────────────────────────────────────────
      # --cwd frontend  tells the CLI the project root is ./frontend
      # from the repo root. Vercel reads frontend/.vercel/project.json
      # (committed above) so no `vercel pull` is needed.
      # Vercel runs `npm run build` inside frontend/ and deploys the
      # output defined in frontend/vercel.json → outputDirectory: dist
      - name: DEBUG — directory state before deploy
        run: |
          echo "=== PWD before deploy ==="
          pwd
          echo "=== frontend/.vercel/ ==="
          ls -la frontend/.vercel/
          echo "=== frontend/.vercel/project.json ==="
          cat frontend/.vercel/project.json

      - name: Deploy to Vercel (production)
        run: vercel deploy --prod --yes --cwd frontend

      - name: DEBUG — directory state after deploy
        if: always()
        run: |
          echo "=== PWD after deploy ==="
          pwd
          echo "=== frontend/dist/ ==="
          ls -la frontend/dist/ 2>/dev/null || echo "dist/ not present (Vercel built remotely)"
          echo "=== frontend/.vercel/ after deploy ==="
          ls -la frontend/.vercel/ 2>/dev/null || echo "no .vercel dir"

  # ----------------------------------------------------------------
  # BACKEND DEPLOY  (AWS ECS / Fargate)
  # ----------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "396287094524"
      ECR_REPOSITORY: inveee-app
      ECS_CLUSTER: inveee-cluster
      ECS_SERVICE: inveee-service
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Build and push Docker image
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_SHA=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE_SHA backend/
          docker tag $IMAGE_SHA $IMAGE_LATEST
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
