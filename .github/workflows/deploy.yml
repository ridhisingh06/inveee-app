# .github/workflows/deploy.yml
name: Deploy Full Stack

# ------------------------------------------------------------
# Triggers
# ------------------------------------------------------------
on:
  workflow_dispatch:          # manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - '**/*.yml'
  pull_request:
    branches: [main]

# ------------------------------------------------------------
# Permissions
# ------------------------------------------------------------
permissions:
  contents: read
  id-token: write

# ============================================================
# JOBS
# ============================================================
jobs:
  # ------------------------------------------------------------
  # DEBUG – repository layout (helps when paths go missing)
  # ------------------------------------------------------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository tree (root)
        run: |
          echo "=== Repository root ==="
          ls -Rla
      - name: Show frontend folder tree
        run: |
          if [ -d "frontend" ]; then
            echo "=== frontend contents ==="
            ls -Rla frontend | head -200
          else
            echo "frontend folder NOT found"
          fi

  # ------------------------------------------------------------
  # BUILD BACKEND (.NET) – unchanged
  # ------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend
      - name: Build backend
        run: dotnet build --configuration Release --no-restore
        working-directory: backend
      - name: Run tests (optional, continue on error)
        run: dotnet test --configuration Release --no-build --verbosity normal
        working-directory: backend
        continue-on-error: true

  # ------------------------------------------------------------
  # BUILD FRONTEND (Angular) – produces an artifact
  # ------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Show frontend tree after checkout (debug)
        run: |
          echo "=== frontend contents ==="
          ls -Rla frontend | head -200

      - name: Setup Node.js (LTS 22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Angular for production
        run: npm run build -- --configuration production
        working-directory: frontend

      - name: Detect Angular dist folder dynamically
        id: detect-dist
        run: |
          echo "=== Detecting Angular output path from angular.json ==="
          OUTPUT_PATH=$(grep -Po "\"outputPath\"\s*:\s*\"\K[^\"]+" frontend/angular.json | head -1)

          if [ -n "$OUTPUT_PATH" ]; then
            DIST_PATH="frontend/$OUTPUT_PATH"
            echo "✅ outputPath found: $OUTPUT_PATH"
          else
            echo "⚠️ outputPath not defined, using fallback"
            if [ -d "frontend/dist" ]; then
              FOUND=$(find frontend/dist -mindepth 1 -maxdepth 1 -type d | head -1)
              DIST_PATH=${FOUND:-frontend/dist}
            else
              DIST_PATH=frontend/dist
            fi
          fi

          # Verify the path exists – fall back if needed
          if [ -d "$DIST_PATH" ]; then
            echo "✅ Dist folder found: $DIST_PATH"
          else
            echo "⚠️ Detected path $DIST_PATH does not exist, falling back to frontend/dist"
            DIST_PATH=frontend/dist
          fi

          echo "dist_path=$DIST_PATH" >> $GITHUB_OUTPUT
          echo "=== Using Angular dist folder: $DIST_PATH ==="
          ls -la "$DIST_PATH"

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ steps.detect-dist.outputs.dist_path }}
          if-no-files-found: error

  # ------------------------------------------------------------
  # DEPLOY – S3 (frontend) + ECS (backend)
  # ------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_S3_BUCKET: invmgmt-master
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: '396287094524'
      ECR_REPOSITORY: inveee-app
      ECS_SERVICE: inveee-service
      ECS_CLUSTER: inveee-cluster
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4

      # --------------------------------------------------------
      # Retrieve the frontend artifact produced by the build job
      # --------------------------------------------------------
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-dist

      - name: Set DIST_PATH variable
        id: set-dist
        run: |
          # The artifact is extracted into the directory "frontend-dist"
          # Flatten it to a stable path (first sub‑directory)
          DIST_ROOT=$(find frontend-dist -type d -mindepth 1 -maxdepth 1 | head -1)
          echo "dist_path=$DIST_ROOT" >> $GITHUB_OUTPUT

      - name: List extracted dist folder (debug)
        run: |
          echo "=== Extracted dist folder contents ==="
          ls -Rla ${{ steps.set-dist.outputs.dist_path }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --------------------------------------------------------
      # Deploy frontend to S3 (assets + index.html)
      # --------------------------------------------------------
      - name: Deploy frontend to S3
        run: |
          echo "=== Syncing frontend-dist to S3 ==="
          ls -la frontend-dist

          aws s3 sync frontend-dist "s3://${{ env.AWS_S3_BUCKET }}" \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"

          echo "=== Uploading index.html without cache ==="
          aws s3 cp "frontend-dist/index.html" "s3://${{ env.AWS_S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      # --------------------------------------------------------
      # Backend Docker image build & push (unchanged)
      # --------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.AWS_ACCOUNT_ID }}

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "=== Building Docker image ==="
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            backend/
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment Summary
        run: |
          echo "\n╔═══════════════════════════════════════════════════════╗"
          echo "║         DEPLOYMENT COMPLETED SUCCESSFULLY          ║"
          echo "╚═══════════════════════════════════════════════════════╝\n"
          echo " Frontend (S3):"
          echo "   URL: http://${{ env.AWS_S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com\n"
          echo " Backend (ECS):"
          echo "   Cluster: ${{ env.ECS_CLUSTER }}"
          echo "   Service: ${{ env.ECS_SERVICE }}"
          echo "   Image: ${{ steps.build-image.outputs.image }}\n"
          echo " Resources:"
          echo "   Region: ${{ env.AWS_REGION }}"
          echo "   Account: ${{ env.AWS_ACCOUNT_ID }}\n"
          echo "All systems operational!"
