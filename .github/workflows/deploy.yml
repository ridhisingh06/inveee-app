# Updated workflow on 2026-07-15
name: Deploy Full Stack

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ----------------------------------------------------------------
  # DEBUG
  # ----------------------------------------------------------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository structure
        run: ls -Rla

  # ----------------------------------------------------------------
  # BACKEND BUILD
  # ----------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Build backend
        working-directory: backend
        run: dotnet build invmgmt.web.csproj -c Release

      - name: Run backend tests
        working-directory: backend
        run: dotnet test -c Release --no-build

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/out

  # ----------------------------------------------------------------
  # FRONTEND DEPLOY  (Vercel)
  #
  # Live URL : https://inveee-app.vercel.app
  # Project  : prj_aY3yPZbu4VL2vhsz8kZHYeCA5K5v
  # Org      : team_W1pwDE1fq8hpwxXcYSXsH7p0
  #
  # ROOT CAUSE of "frontend/frontend" error
  # ───────────────────────────────────────
  # The Vercel project has rootDirectory="frontend" stored in the
  # dashboard (visible in .vercel/repo.json → "directory": "frontend").
  # `vercel pull` fetches that setting and writes it into
  # .vercel/project.json as "rootDirectory": "frontend".
  # When the CLI then runs ANY subsequent command it prepends
  # rootDirectory to all internal paths.
  # If the shell is already inside frontend/ (working-directory: frontend)
  # the result is frontend/ + frontend/ = frontend/frontend — the error.
  #
  # FIX
  # ───
  # Skip `vercel pull` entirely.
  # frontend/.vercel/project.json is committed in the repo with only
  # projectId and orgId — no rootDirectory key.
  # The CLI reads that file from the CWD (frontend/) and resolves all
  # paths relative to frontend/ with no doubling.
  # All three Vercel commands run with working-directory: frontend.
  # No --cwd flag is used anywhere.
  #
  # Secrets required (GitHub → Settings → Secrets → Actions):
  #   VERCEL_TOKEN  — Vercel personal access token
  #   VERCEL_ORG_ID — team_W1pwDE1fq8hpwxXcYSXsH7p0
  #   Project_ID    — prj_aY3yPZbu4VL2vhsz8kZHYeCA5K5v
  # ----------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.Project_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Confirm CWD, .vercel/project.json content, and env vars
      - name: DEBUG — pre-flight checks
        working-directory: frontend
        run: |
          echo "=== PWD (must be .../inveee-app/frontend) ==="
          pwd
          echo "=== .vercel/project.json ==="
          cat .vercel/project.json
          echo "=== vercel.json ==="
          cat vercel.json
          echo "=== VERCEL_TOKEN set?  $([ -n "$VERCEL_TOKEN" ]  && echo YES || echo NO — secret empty)"
          echo "=== VERCEL_ORG_ID set? $([ -n "$VERCEL_ORG_ID" ] && echo YES || echo NO — secret empty)"
          echo "=== VERCEL_PROJECT_ID: $VERCEL_PROJECT_ID"

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      # vercel build runs npm run build and writes the Vercel Output API
      # bundle to frontend/.vercel/output/ — all paths stay inside frontend/.
      # NO vercel pull — skipping it prevents rootDirectory from being
      # written into .vercel/project.json and doubling the path.
      - name: Build project via Vercel
        working-directory: frontend
        run: vercel build --prod

      - name: DEBUG — build output
        working-directory: frontend
        run: |
          echo "=== .vercel/output/ ==="
          ls -la .vercel/output/ 2>/dev/null || echo ".vercel/output/ not found"
          echo "=== .vercel/output/static/ (first 20 files) ==="
          ls -la .vercel/output/static/ 2>/dev/null | head -20 || echo "static/ not found"
          echo "=== .vercel/output/static/index.html ==="
          ls -la .vercel/output/static/index.html 2>/dev/null || echo "index.html not found"

      # vercel deploy --prebuilt uploads .vercel/output/ directly.
      # The shell is already inside frontend/ so .vercel/output/ resolves
      # correctly — no frontend/frontend path is ever constructed.
      - name: Deploy to Vercel (production)
        working-directory: frontend
        run: vercel deploy --prebuilt --prod

      - name: DEBUG — post-deploy
        if: always()
        working-directory: frontend
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== .vercel/project.json ==="
          cat .vercel/project.json 2>/dev/null || echo "not found"

  # ----------------------------------------------------------------
  # BACKEND DEPLOY  (AWS ECS / Fargate)
  # ----------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "396287094524"
      ECR_REPOSITORY: inveee-app
      ECS_CLUSTER: inveee-cluster
      ECS_SERVICE: inveee-service
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Build and push Docker image
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_SHA=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE_SHA backend/
          docker tag $IMAGE_SHA $IMAGE_LATEST
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
