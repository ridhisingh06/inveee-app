# Updated workflow on 2026-07-15
name: Deploy Full Stack

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ----------------------------------------------------------------
  # DEBUG
  # ----------------------------------------------------------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show repository structure
        run: ls -Rla

  # ----------------------------------------------------------------
  # BACKEND BUILD
  # ----------------------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Build backend
        working-directory: backend
        run: dotnet build invmgmt.web.csproj -c Release

      - name: Run backend tests
        working-directory: backend
        run: dotnet test -c Release --no-build

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/out

  # ----------------------------------------------------------------
  # FRONTEND DEPLOY  (Vercel)
  #
  # Live URL : https://inveee-app.vercel.app
  # Project  : prj_aY3yPZbu4VL2vhsz8kZHYeCA5K5v
  # Org      : team_W1pwDE1fq8hpwxXcYSXsH7p0
  #
  # All Angular / Vercel steps run with:
  #   working-directory: frontend
  # so the shell CWD is always the Angular project root.
  # No --cwd flag is used on any Vercel command because the shell is
  # already inside frontend/. Using --cwd on top of working-directory
  # caused the old "frontend/frontend" double-path error.
  #
  # frontend/.vercel/project.json is committed in the repo so
  # `vercel pull` is skipped — the CLI reads project/org IDs from
  # that file and from the VERCEL_* env vars below.
  #
  # Secrets required (GitHub → Settings → Secrets → Actions):
  #   VERCEL_TOKEN   — Vercel personal access token
  #   VERCEL_ORG_ID  — team_W1pwDE1fq8hpwxXcYSXsH7p0
  #   Project_ID     — prj_aY3yPZbu4VL2vhsz8kZHYeCA5K5v
  # ----------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.Project_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Node.js ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Install Vercel CLI globally ──────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── Debug: confirm we are inside frontend/ ───────────────────
      - name: DEBUG — working directory and project files
        working-directory: frontend
        run: |
          echo "=== PWD (must end in /frontend) ==="
          pwd
          echo "=== frontend/ root listing ==="
          ls -la
          echo "=== .vercel/ contents ==="
          ls -la .vercel/ 2>/dev/null || echo ".vercel/ does not exist yet"
          echo "=== .vercel/project.json ==="
          cat .vercel/project.json 2>/dev/null || echo "project.json not found"
          echo "=== vercel.json ==="
          cat vercel.json
          echo "=== VERCEL env vars ==="
          echo "VERCEL_TOKEN set?   $([ -n "$VERCEL_TOKEN" ]   && echo YES || echo NO)"
          echo "VERCEL_ORG_ID set?  $([ -n "$VERCEL_ORG_ID" ]  && echo YES || echo NO)"
          echo "VERCEL_PROJECT_ID?  $VERCEL_PROJECT_ID"

      # ── Install npm dependencies ─────────────────────────────────
      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      # ── Vercel pull: sync project settings from dashboard ────────
      # Runs from inside frontend/ so .vercel/ is written into
      # frontend/.vercel/ — never into a nested frontend/frontend/.
      - name: Pull Vercel project settings
        working-directory: frontend
        run: vercel pull --yes --environment=production

      # ── Debug: confirm .vercel/ was written correctly ────────────
      - name: DEBUG — .vercel/ after pull
        working-directory: frontend
        run: |
          echo "=== .vercel/ after pull ==="
          ls -la .vercel/
          echo "=== .vercel/project.json after pull ==="
          cat .vercel/project.json

      # ── Vercel build: run Angular build on Vercel infra ──────────
      # Runs from inside frontend/ so build artefacts land in
      # frontend/dist/ as defined in angular.json outputPath: "dist".
      - name: Build project via Vercel
        working-directory: frontend
        run: vercel build --prod

      # ── Debug: confirm build output is correct ───────────────────
      - name: DEBUG — build output
        working-directory: frontend
        run: |
          echo "=== dist/ after build ==="
          ls -la dist/ 2>/dev/null || echo "dist/ not found"
          echo "=== dist/index.html ==="
          ls -la dist/index.html 2>/dev/null || echo "dist/index.html not found"
          echo "=== .vercel/output/ (Vercel Output API) ==="
          ls -la .vercel/output/ 2>/dev/null || echo ".vercel/output/ not present"

      # ── Deploy pre-built output to Vercel ────────────────────────
      - name: Deploy to Vercel (production)
        working-directory: frontend
        run: vercel deploy --prebuilt --prod

      # ── Debug: post-deploy state ─────────────────────────────────
      - name: DEBUG — post-deploy state
        if: always()
        working-directory: frontend
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== .vercel/ ==="
          ls -la .vercel/ 2>/dev/null || echo "no .vercel dir"
          echo "=== .vercel/project.json ==="
          cat .vercel/project.json 2>/dev/null || echo "not found"

  # ----------------------------------------------------------------
  # BACKEND DEPLOY  (AWS ECS / Fargate)
  # ----------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "396287094524"
      ECR_REPOSITORY: inveee-app
      ECS_CLUSTER: inveee-cluster
      ECS_SERVICE: inveee-service
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Publish backend
        working-directory: backend
        run: dotnet publish invmgmt.web.csproj -c Release -o out

      - name: Build and push Docker image
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_SHA=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE_SHA backend/
          docker tag $IMAGE_SHA $IMAGE_LATEST
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
