# .github/workflows/deploy.yml
name: Deploy Full-Stack Application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  debug:
    name: Verify Repository Layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show working directory
        run: pwd
      - name: List repository tree (first 200 items)
        run: |
          echo "=== Repository root ==="
          ls -la
          echo "=== Backend folder (backend) ==="
          if [ -d "backend" ]; then
            ls -Rla backend | head -200
          else
            echo "❌ backend folder NOT found"
          fi
          echo "=== Frontend folder (frontend) ==="
          if [ -d "frontend" ]; then
            ls -Rla frontend | head -200
          else
            echo "❌ frontend folder NOT found"
          fi

  build-backend:
    name: Build .NET Backend
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4
      - name: Debug – show backend tree
        run: |
          echo "=== Backend (backend) contents ==="
          ls -Rla backend | head -200
      - name: Setup .NET 10 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
      - name: Restore NuGet packages
        run: dotnet restore
        working-directory: backend
      - name: Build backend
        run: dotnet build --configuration Release --no-restore
        working-directory: backend
      - name: Run unit tests
        run: dotnet test --configuration Release --no-build --verbosity normal
        working-directory: backend
        continue-on-error: true

  build-frontend:
    name: Build Angular Frontend
    runs-on: ubuntu-latest
    needs: debug
    steps:
      - uses: actions/checkout@v4
      - name: Debug – list frontend tree
        run: |
          echo "=== Frontend (frontend) contents ==="
          ls -Rla frontend | head -200
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install npm dependencies
        run: npm ci
        working-directory: frontend
      - name: Build Angular for production
        run: npm run build -- --configuration production
        working-directory: frontend
      - name: Verify Angular build output
        run: |
          echo "=== Checking dist folder ==="
          if [ -d "frontend/dist" ]; then
            echo "✅ dist folder found"
            find frontend/dist -type f | head -20
          else
            echo "❌ dist folder NOT found"
            exit 1
          fi

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_S3_BUCKET: invmgmt-master
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: '396287094524'
      ECR_REPOSITORY: inveee-app
      ECS_SERVICE: inveee-service
      ECS_CLUSTER: inveee-cluster
      CONTAINER_NAME: app
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Debug – Show all files after Angular build
        run: ls -R frontend
        working-directory: .
      - name: Detect Angular build output path
        id: detect-dist
        run: |
          echo "=== Detecting Angular output path from angular.json ==="
          # Try to extract explicit outputPath from angular.json
          OUTPUT_PATH=$(grep -Po '"outputPath"\s*:\s*"\K[^"]+' frontend/angular.json | head -1)
          if [ -z "$OUTPUT_PATH" ]; then
            echo "⚠️ outputPath not defined, falling back to default Angular dist location"
          else
            echo "✅ Found outputPath: $OUTPUT_PATH"
          fi
          # Determine final dist path
          if [ -n "$OUTPUT_PATH" ]; then
            DIST_PATH="frontend/$OUTPUT_PATH"
          else
            # Default to <project-name> folder under dist if exists, else generic dist
            DEFAULT_PATH=$(ls frontend/dist 2>/dev/null | head -1)
            if [ -n "$DEFAULT_PATH" ]; then
              DIST_PATH="frontend/dist/$DEFAULT_PATH"
            else
              DIST_PATH="frontend/dist"
            fi
          fi
          if [ -d "$DIST_PATH" ]; then
            echo "dist_path=$DIST_PATH" >> $GITHUB_OUTPUT
            echo "=== Found Angular dist folder: $DIST_PATH ==="
            ls -la "$DIST_PATH"
          else
            echo "❌ Unable to locate Angular dist folder at $DIST_PATH"
            echo "Available dist directories:"
            echo "Available dist locations:"
            find frontend -type d -name dist
            exit 1
          fi
      - name: Deploy frontend to S3
        run: |
          DIST_PATH="${{ steps.detect-dist.outputs.dist_path }}"
          echo "=== Syncing $DIST_PATH → s3://${{ env.AWS_S3_BUCKET }} ==="
          aws s3 sync "$DIST_PATH" "s3://${{ env.AWS_S3_BUCKET }}" \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"
          echo "=== Uploading index.html without cache ==="
          aws s3 cp "$DIST_PATH/index.html" "s3://${{ env.AWS_S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.AWS_ACCOUNT_ID }}
      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "=== Building Docker image ==="
          echo "Registry: $ECR_REGISTRY"
          echo "Repository: $ECR_REPOSITORY"
          echo "Tag: $IMAGE_TAG"
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
                       -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
                       backend/
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
      - name: Deploy task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
      - name: Deployment Summary
        run: |
          echo ""
          echo "╔═══════════════════════════════════════════════════════╗"
          echo "║         🚀 DEPLOYMENT COMPLETED SUCCESSFULLY          ║"
          echo "╚═══════════════════════════════════════════════════════╝"
          echo ""
          echo "📦 Frontend (S3):"
          echo "   URL: http://${{ env.AWS_S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
          echo ""
          echo "🔧 Backend (ECS):"
          echo "   Cluster: ${{ env.ECS_CLUSTER }}"
          echo "   Service: ${{ env.ECS_SERVICE }}"
          echo "   Image: ${{ steps.build-image.outputs.image }}"
          echo ""
          echo "📊 Resources:"
          echo "   Region: ${{ env.AWS_REGION }}"
          echo "   Account: ${{ env.AWS_ACCOUNT_ID }}"
          echo ""
          echo "✅ All systems operational!"
