name: Deploy Full Stack

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ---------------- DEBUG ----------------
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show repository structure
        run: ls -Rla

  # ---------------- FRONTEND BUILD ----------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: debug

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/frontend

  # ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: [debug, build-frontend]

    if: github.ref == 'refs/heads/main'

    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "396287094524"

      AWS_S3_BUCKET: invmgmt-master

      ECR_REPOSITORY: inveee-app

      ECS_CLUSTER: inveee-cluster
      ECS_SERVICE: inveee-service
      CONTAINER_NAME: app

    steps:
      - uses: actions/checkout@v4

      # ---------------- Download Angular ----------------

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-dist

      - name: Verify frontend files
        run: ls -R frontend-dist

      # ---------------- AWS ----------------

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ---------------- Deploy Frontend ----------------

      - name: Upload to S3
        run: |
          aws s3 sync frontend-dist s3://${{ env.AWS_S3_BUCKET }} --delete

      - name: Configure Static Website
        run: |
          aws s3 website s3://${{ env.AWS_S3_BUCKET }} \
            --index-document index.html \
            --error-document index.html

      - name: Apply Bucket Policy
        run: |
          cat > policy.json <<EOF
          {
            "Version":"2012-10-17",
            "Statement":[
              {
                "Effect":"Allow",
                "Principal":"*",
                "Action":"s3:GetObject",
                "Resource":"arn:aws:s3:::${{ env.AWS_S3_BUCKET }}/*"
              }
            ]
          }
          EOF

          aws s3api put-bucket-policy \
            --bucket ${{ env.AWS_S3_BUCKET }} \
            --policy file://policy.json

      # ---------------- Docker ----------------

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        id: build-image
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}

          IMAGE_SHA=$REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          IMAGE_LATEST=$REGISTRY/${{ env.ECR_REPOSITORY }}:latest

          docker build -t $IMAGE_SHA backend/

          docker tag $IMAGE_SHA $IMAGE_LATEST

          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST

          echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

      # ---------------- ECS ----------------

      - name: Render ECS Task Definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          cluster: inveee-cluster
          service: inveee-service
          wait-for-service-stability: true
