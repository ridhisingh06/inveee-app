server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the backend container
  location /api/ {
    # Use Docker DNS resolver for service discovery
    resolver 127.0.0.11 valid=30s;
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    
    # CORS headers to allow the Angular app to call the API
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
    
    # Preflight request handling
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
        add_header Content-Length 0;
        return 204;
    }
    
    # Connection settings
    proxy_set_header Connection "upgrade";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    
    # Timeouts - critical for preventing 502 errors
    proxy_connect_timeout 30s;    # Time to establish connection to backend
    proxy_send_timeout 60s;       # Time to send request to backend
    proxy_read_timeout 300s;      # Time to read response — 5 min for large CSV exports
    
    # Buffering settings — sized for large CSV downloads
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 64k;
    proxy_max_temp_file_size 256m;
    proxy_cache_bypass $http_upgrade;
    
    # Ensure download headers pass through for CSV exports
    proxy_pass_header Content-Disposition;
    proxy_pass_header Content-Type;
    proxy_pass_header Content-Length;
    
    # Ensure large payloads are allowed
    client_max_body_size 50M;
    
    # Don't close connection on errors - let client retry
    proxy_set_header Connection "";
    
    # Allow backend to use chunked encoding
    chunked_transfer_encoding on;
    
    # Log backend errors for debugging
    access_log /var/log/nginx/backend_access.log;
    error_log /var/log/nginx/backend_error.log warn;
  }

  # Health check endpoint (no proxy, direct response)
  location /health {
    access_log off;
    return 200 '{"status":"ok"}';
    add_header Content-Type application/json;
  }

  # Ignore Chrome DevTools well-known probes
  location = /.well-known/appspecific/com.chrome.devtools.json {
    return 204;
  }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
