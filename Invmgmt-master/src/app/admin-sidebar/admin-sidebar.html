<aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
  <div class="sidebar-header">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      <span class="brand-text" *ngIf="!isSidebarCollapsed">InventoryMgmt</span>
    </div>
  </div>
  
  <nav class="sidebar-nav">
    <div class="nav-group" *ngFor="let group of navGroups">
      <div class="group-label" *ngIf="!isSidebarCollapsed">{{ group.title }}</div>
      <a *ngFor="let item of group.items" 
         [routerLink]="item.route" 
         routerLinkActive="active" 
         class="nav-link"
         [title]="isSidebarCollapsed ? item.label : ''">
        <svg class="nav-icon"><use [attr.href]="'#' + item.icon"></use></svg>
        <span class="link-text" *ngIf="!isSidebarCollapsed">{{ item.label }}</span>
      </a>
    </div>
  </nav>
