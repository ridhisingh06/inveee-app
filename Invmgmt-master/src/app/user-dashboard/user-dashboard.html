<div class="layout">
  <aside class="sidebar" [class.closed]="!sidebarOpen">
    <div class="sidebar-container">
      <div class="side-header">
        <h2 class="side-title">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
            <path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          Inventory Hub
        </h2>
        <button class="side-toggle" type="button" (click)="toggleSidebar()" [title]="sidebarOpen ? 'Collapse menu' : 'Expand menu'">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path *ngIf="sidebarOpen" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            <path *ngIf="!sidebarOpen" d="M10 6L8.59 7.41 12.17 11 8.59 14.59 10 16l6-6z"/>
          </svg>
        </button>
      </div>

      <nav class="side-nav">
        <a routerLink="/user-dashboard/item-list"
           routerLinkActive="active"
           class="nav-item" id="nav-browse-items">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <span class="nav-label">Browse Items</span>
        </a>

        <a routerLink="/user-dashboard/my-requests"
           routerLinkActive="active"
           class="nav-item" id="nav-my-requests">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span class="nav-label">My Requests</span>
        </a>

        <a routerLink="/user-dashboard/cart"
           routerLinkActive="active"
           class="nav-item" id="nav-cart">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="nav-label">Shopping Cart</span>
        </a>
      </nav>

      <!-- Logout -->
      <div class="side-footer">
        <button class="logout-btn" (click)="logout()" type="button" id="btn-logout">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span class="nav-label">Sign Out</span>
        </button>
      </div>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
