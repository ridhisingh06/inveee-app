version: '3.8'

services:
  frontend:
    build: ./invmgmt-master
    ports:
      - "4200:80"
    depends_on:
      - backend

  backend:
    build: ./invmgmt.web
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=5000
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=mydb;Username=postgres;Password=postgres
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: InvMgmtDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ridhi@608
    ports:
      - "5432:5432"